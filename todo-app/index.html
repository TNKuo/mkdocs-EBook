<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #2563eb;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 16px;
    }

    .card {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 12px;
      box-shadow: 0 18px 40px rgba(30, 64, 175, 0.2);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.75rem;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    #todo-input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }

    #todo-input:focus {
      border-color: #2563eb;
    }

    #add-btn {
      padding: 10px 18px;
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    #add-btn:hover {
      background: #1e40af;
    }

    #add-btn:active {
      transform: scale(0.97);
    }

    .stats {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 12px;
    }

    #todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      background: #fafafa;
      transition: background 0.15s;
      animation: slide-in 0.2s ease;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item:hover {
      background: #f3f3ff;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .todo-item input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      word-break: break-word;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1.1rem;
      line-height: 1;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #ef4444;
      background: #fef2f2;
    }

    .empty-state {
      text-align: center;
      color: #bbb;
      font-size: 0.9rem;
      padding: 24px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>📝 Todo App</h1>

    <div class="input-row">
      <input
        id="todo-input"
        type="text"
        placeholder="What needs to be done?"
        maxlength="200"
        autocomplete="off"
      />
      <button id="add-btn">Add</button>
    </div>

    <p class="stats" id="stats"></p>
    <ul id="todo-list"></ul>
    <p class="empty-state" id="empty-state">No todos yet. Add one above!</p>
  </div>

  <script>
    const input = document.getElementById('todo-input');
    const addBtn = document.getElementById('add-btn');
    const list = document.getElementById('todo-list');
    const statsEl = document.getElementById('stats');
    const emptyEl = document.getElementById('empty-state');

    let todos = JSON.parse(localStorage.getItem('todos') || '[]');

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function updateStats() {
      const done = todos.filter(t => t.done).length;
      statsEl.textContent = todos.length
        ? `${done} of ${todos.length} completed`
        : '';
      emptyEl.style.display = todos.length ? 'none' : 'block';
    }

    function render() {
      list.innerHTML = '';
      todos.forEach((todo, index) => {
        const li = document.createElement('li');
        li.className = 'todo-item' + (todo.done ? ' done' : '');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = todo.done;
        checkbox.addEventListener('change', () => {
          todos[index].done = checkbox.checked;
          save();
          render();
        });

        const span = document.createElement('span');
        span.className = 'todo-text';
        span.textContent = todo.text;

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = '✕';
        deleteBtn.title = 'Delete';
        deleteBtn.addEventListener('click', () => {
          todos.splice(index, 1);
          save();
          render();
        });

        li.append(checkbox, span, deleteBtn);
        list.appendChild(li);
      });
      updateStats();
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.push({ text, done: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    addBtn.addEventListener('click', addTodo);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
